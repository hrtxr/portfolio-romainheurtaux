{% extends 'base.html' %}

{% block title %}_// Projets{% endblock %}

{% block content %}
    <section class="pt-12 pb-24 px-6 lg:px-24 bg-black text-steel min-h-screen">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-6xl lg:text-8xl font-modius mb-16 text-left text-signal break-words w-full">Projects</h1>
            
            <!-- React Root -->
            <div id="project-gallery-react-root"></div>
        </div>
    </section>
{% endblock %}

{% block extra_js %}
<script type="text/babel" src="{{ url_for('static', filename='js/ProjectCard.jsx') }}"></script>
<script type="text/babel">
    const projects = {{ projects | tojson | safe }};
    const root = ReactDOM.createRoot(document.getElementById('project-gallery-react-root'));
    
    const App = () => (
        <div>
            <div className="mb-24">
                <h2 className="text-3xl lg:text-4xl font-modius mb-12 text-signal border-l-4 border-uv pl-4">Projets Universitaires</h2>
                <ProjectGallery projects={projects} category="Universitaire" />
            </div>
            
            <div className="mb-24">
                <h2 className="text-3xl lg:text-4xl font-modius mb-12 text-signal border-l-4 border-uv pl-4">Projets Personnels</h2>
                <ProjectGallery projects={projects} category="Personnel" />
            </div>
        </div>
    );
    
    root.render(<App />);
</script>
{% endblock %}
